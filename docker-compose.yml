version: '3.8'

services:
  web:
    build: ./web
    ports:
      - "5000:5000"
    volumes:
      - /proc:/host/proc:ro
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - HOST_PROC=/host/proc
      - DB_PATH=/app/data/server_monitor.db
    restart: unless-stopped

  bot:
    build: ./bot
    volumes:
      - ./data:/app/data
      - /proc:/host/proc:ro
    environment:
      - HOST_PROC=/host/proc
      - DB_PATH=/app/data/server_monitor.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
    restart: unless-stopped