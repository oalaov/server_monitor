<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .metric-card {
            transition: transform 0.2s;
            cursor: pointer;
        }
        .metric-card:hover {
            transform: scale(1.05);
        }
        .critical { color: #dc3545; }
        .warning { color: #ffc107; }
        .normal { color: #198754; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">📊 Server Monitor</h1>
        
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card metric-card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">CPU</h5>
                        <h2 id="cpu" class="display-4">0%</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">RAM</h5>
                        <h2 id="ram" class="display-4">0%</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card bg-info text-white">
                    <div class="card-body">
                        <h5 class="card-title">Disk</h5>
                        <h2 id="disk" class="display-4">0%</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card bg-secondary text-white">
                    <div class="card-body">
                        <h5 class="card-title">Last Update</h5>
                        <h6 id="last-update" class="card-text">--:--:--</h6>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>CPU Usage History</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="cpuChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>RAM Usage History</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="ramChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>⚠️ Recent Alerts</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped" id="alerts-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Message</th>
                                <th>Severity</th>
                            </tr>
                        </thead>
                        <tbody id="alerts-body">
                            <tr>
                                <td colspan="3" class="text-center">Loading alerts...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cpuData = [];
        let ramData = [];
        let timeLabels = [];
        let maxDataPoints = 20;

        const ctxCpu = document.getElementById('cpuChart').getContext('2d');
        const ctxRam = document.getElementById('ramChart').getContext('2d');
        
        const cpuChart = new Chart(ctxCpu, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{
                    label: 'CPU %',
                    data: cpuData,
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                }]
            }
        });

        const ramChart = new Chart(ctxRam, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{
                    label: 'RAM %',
                    data: ramData,
                    borderColor: 'rgb(54, 162, 235)',
                    tension: 0.1
                }]
            }
        });

        async function updateMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();
                
                document.getElementById('cpu').textContent = data.cpu + '%';
                document.getElementById('ram').textContent = data.ram + '%';
                document.getElementById('disk').textContent = data.disk + '%';
                document.getElementById('last-update').textContent = data.time;
                
                const cpuElem = document.getElementById('cpu');
                if (data.cpu > 80) cpuElem.className = 'display-4 critical';
                else if (data.cpu > 60) cpuElem.className = 'display-4 warning';
                else cpuElem.className = 'display-4 normal';
                
                cpuData.push(data.cpu);
                ramData.push(data.ram);
                timeLabels.push(data.time);
                
                if (cpuData.length > maxDataPoints) {
                    cpuData.shift();
                    ramData.shift();
                    timeLabels.shift();
                }
                
                cpuChart.update();
                ramChart.update();
                
            } catch (error) {
                console.error('Error fetching metrics:', error);
            }
        }

        async function updateAlerts() {
            try {
                const response = await fetch('/api/alerts');
                const alerts = await response.json();
                
                const tbody = document.getElementById('alerts-body');
                tbody.innerHTML = '';
                
                if (alerts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="text-center">No alerts</td></tr>';
                    return;
                }
                
                alerts.forEach(alert => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = alert.time || alert.timestamp;
                    row.insertCell(1).textContent = alert.message;
                    const severityCell = row.insertCell(2);
                    severityCell.textContent = alert.severity || 'INFO';
                    if (alert.severity === 'CRITICAL') {
                        severityCell.className = 'critical';
                    }
                });
            } catch (error) {
                console.error('Error fetching alerts:', error);
            }
        }

        updateMetrics();
        updateAlerts();
        setInterval(updateMetrics, 1000);
        setInterval(updateAlerts, 1000);
    </script>
</body>
</html>
